carla:
  fixed_delta_seconds: 0.05
  host: localhost
  map: Town03
  port: 2000
  synchronous_mode: true
  timeout: 10.0
  weather: ClearNoon
control:
  emergency_brake_distance: 3.0
  max_steering_angle: 70.0
  pid:
    steering:
      kd: 0.1
      ki: 0.0
      kp: 1.0
    throttle:
      kd: 0.01
      ki: 0.05
      kp: 0.8
cooperation:
  communication:
    dropout_rate: 0.0
    max_latency_ms: 100
    protocol: ros2_topic
  enabled: true
  message_frequency: 10
  num_cooperative_vehicles: 2
  # Distance-aware coordination parameters
  coordination_range: 50.0        # Max range for coordination (meters)
  active_coordination_range: 30.0 # Active coordination range (meters)
  warning_range: 15.0             # Warning/critical range (meters)
  scenarios:
  - intersection_coordination
  - occlusion_compensation
  - platooning
  - deadlock_resolution
dashboard:
  enabled: true
  show_apf_field: true
  show_bev: true
  show_cooperation_info: true
  show_detections: true
  window_size:
  - 1280
  - 720
depth:
  max_distance: 100.0
  source: carla_depth_camera
ego_vehicle:
  blueprint_filter: vehicle.tesla.model3
  spawn_index: null
logging:
  level: INFO
  output_dir: output/
  save_metrics: true
  save_video: false
perception:
  confidence_threshold: 0.4
  cyclist_classes:
  - 1
  imgsz: 416
  model_path: model/yolov8n.pt
  onnx_model_path: model/yolo11n.onnx
  pedestrian_classes:
  - 0
  traffic_sign_classes:
  - 9
  - 11
  - 12
  use_onnx: false
  vehicle_classes:
  - 2
  - 3
  - 5
  - 7
planning:
  apf:
    d0: 22.823080936862695
    emergency_distance: 4.247641618211044
    goal_tolerance: 5.0
    k_attractive: 2.022154332201987
    k_repulsive: 144.8956513173414
    max_speed: 23.16680589002507
    min_speed: 5.0
  path_smoothing:
    bezier_order: 5
    smoothing_factor: 0.3
raspberry_pi:
  host: 192.168.1.100
  motor_control:
    max_speed_pwm: 100
    turn_speed_pwm: 60
    type: pwm
  ros2_domain_id: 0
  ssh_port: 22
  ultrasonic:
    echo_pin: 24
    emergency_distance: 0.15
    trigger_pin: 23
sensors:
  depth_camera:
    fov: 110
    image_size_x: 1280
    image_size_y: 720
    position:
    - 1.5
    - 0.0
    - 2.4
  rgb_camera:
    fov: 110
    image_size_x: 1280
    image_size_y: 720
    position:
    - 1.5
    - 0.0
    - 2.4
